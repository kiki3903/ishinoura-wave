name: Wave Watch
on:
  workflow_dispatch:
jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-${{ steps.date.outputs.week }}
      - name: Install ffmpeg and Japanese font
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Ensure "daily" release exists
        run: |
          gh release view daily --repo "$GITHUB_REPOSITORY" 2>/dev/null \
            || gh release create daily \
                --prerelease \
                --title "Daily Post (auto-generated)" \
                --notes "毎日の波情報動画。GitHub Actions により自動更新されます。" \
                --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run wave watch
        run: node --experimental-strip-types src/wave-watch.js
        env:
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Save wave state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add wave-state.json
          git diff --staged --quiet || git commit -m "Update wave state [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
